<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Studentinfo</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
    }

    .container {
        width: 90%;
        margin: 30px auto;
        border: 1px solid #999;
        padding: 15px;
        background-color: #fff;
    }

    fieldset {
        border: 1px solid #999;
        padding: 15px;
    }

    legend {
        font-weight: bold;
    }

    .form-row {
        display: flex;
        margin-bottom: 10px;
        align-items: center;
    }

    label {
        width: 150px;
        font-size: 14px;
    }

    input {
        padding: 5px;
        width: 180px;
        margin-right: 20px;
        border: 1px solid #ccc;
        border-radius: 3px;
    }

    .btn {
        padding: 5px 12px;
        border: none;
        border-radius: 10px;
        font-size: 13px;
        cursor: pointer;
    }

    .submit {
        background-color: #2d8cff;
        color: white;
    }

    .clear {
        background-color: #ddd;
    }
</style>

</head>
<body>

<div class="container">
    <fieldset>
        <legend>Student Information</legend>

        <div class="form-row">
            <label>Full Name (Text)</label>
            <input type="text" placeholder="Enter your full name">

            <label>E-mail Address</label>
            <input type="email" placeholder="your.email@example.com">
        </div>

        <div class="form-row">
            <label>Password</label>
            <input type="password" placeholder="Enter Secure password">

            <label>Age (Number)</label>
            <input type="number" placeholder="Enter your age">
        </div>

        <div class="form-row">
            <label>Experiment Date</label>
            <input type="date">

            <label>Phone Number (Tel)</label>
            <input type="tel" placeholder="+880 xxxx xxxxxx">
        </div>

        <button class="btn submit">Submit</button>
        <button class="btn clear">Clear</button>

    </fieldset>
</div>

</body>
</html>
